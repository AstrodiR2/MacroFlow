name: Build MacroFlow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Geode SDK
        uses: geode-sdk/build-geode-mod/setup@main

      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        with:
          platform: android64
